name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: macos-latest
    timeout-minutes: 45

    strategy:
      matrix:
        api-level: [29]
        target: [default]
        arch: [x86_64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run Flutter analyzer
        run: flutter analyze

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run unit tests
        run: flutter test --coverage

      # iOS Integration Tests (on macOS runners)
      - name: Run iOS integration tests - Onboarding Flow
        run: |
          xcrun simctl boot "iPhone 15 Pro" || true
          flutter test integration_test/onboarding_flow_test.dart -d iPhone
        continue-on-error: true

      - name: Run iOS integration tests - Nutrition Tracking
        run: flutter test integration_test/nutrition_tracking_flow_test.dart -d iPhone
        continue-on-error: true

      - name: Run iOS integration tests - Water Tracking
        run: flutter test integration_test/water_tracking_flow_test.dart -d iPhone
        continue-on-error: true

      - name: Run iOS integration tests - Progress Flow
        run: flutter test integration_test/progress_flow_test.dart -d iPhone
        continue-on-error: true

      - name: Run iOS integration tests - Profile Management
        run: flutter test integration_test/profile_flow_test.dart -d iPhone
        continue-on-error: true

      - name: Run iOS integration tests - Complete Journey
        run: flutter test integration_test/complete_user_journey_test.dart -d iPhone
        continue-on-error: true

      - name: Run iOS integration tests - Legacy Tests
        run: flutter test integration_test/app_test.dart -d iPhone
        continue-on-error: true

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ios
          path: |
            test-results/
            coverage/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: integration-tests
          name: integration-coverage

  # Separate job for Android tests (optional)
  android-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Enable KVM for faster Android emulator
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Run Android integration tests with emulator
      - name: Run Android Integration Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            flutter test integration_test/app_test.dart
            flutter test integration_test/onboarding_flow_test.dart
            flutter test integration_test/nutrition_tracking_flow_test.dart
            flutter test integration_test/water_tracking_flow_test.dart
            flutter test integration_test/progress_flow_test.dart
            flutter test integration_test/profile_flow_test.dart
            flutter test integration_test/complete_user_journey_test.dart
        continue-on-error: true

      - name: Upload Android test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-android
          path: |
            test-results/
            coverage/
          retention-days: 30

  # Test summary job
  test-summary:
    needs: [integration-tests, android-integration-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download iOS test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-ios
          path: ios-results
        continue-on-error: true

      - name: Download Android test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-android
          path: android-results
        continue-on-error: true

      - name: Create test summary
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### iOS Tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests completed on iOS Simulator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Android Tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests completed on Android Emulator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Files" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Onboarding Flow" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Nutrition Tracking Flow" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Water Tracking Flow" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Progress Flow" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Profile Management Flow" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Complete User Journey" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Legacy Tests" >> $GITHUB_STEP_SUMMARY

